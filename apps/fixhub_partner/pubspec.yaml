name: fixhub_partner
description: 'Fixhub partner app'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  dio: ^5.10.0
  go_router: ^17.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  shimmer: ^3.0.0
  pinput: ^6.0.2
  intl: ^0.20.3
  geolocator: ^14.0.3
  geocoding: ^5.0.0
  google_maps_flutter: ^2.17.1
  image_picker: ^1.2.3
  lottie: ^3.5.1
  url_launcher: ^6.3.2
  google_fonts: ^6.2.1
  flutter_dotenv: ^6.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/
