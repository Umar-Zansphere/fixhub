version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fixhub-postgres-prod
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fixhub-network

  redis:
    image: redis:7-alpine
    container_name: fixhub-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fixhub-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fixhub-backend-prod
    restart: always
    ports:
      - '${APP_PORT:-3000}:3000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000/api/v1/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fixhub-network

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    container_name: fixhub-admin-prod
    restart: always
    ports:
      - '3001:3000'
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - fixhub-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  fixhub-network:
    driver: bridge
